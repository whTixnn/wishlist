<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Mi Wishlist 🎁</title>

<style>
body {
    font-family: Arial;
    background: #f5f5f5;
    margin: 0;
}

/* 🔵 HEADER AZUL */
header {
    background: #007BFF;
    color: white;
    padding: 20px;
    text-align: center;
}

.versiculo {
    font-size: 14px;
    font-style: italic;
    margin-top: 10px;
    color: #cce5ff;
}

.broma {
    margin-top: 5px;
    font-size: 13px;
    color: #e6f0ff;
}

.container {
    width: 90%;
    margin: auto;
}

.filtros {
    margin: 20px 0;
    text-align: center;
}

select {
    padding: 8px;
    font-size: 16px;
}

.categoria {
    margin-top: 30px;
}

.categoria h2 {
    border-bottom: 2px solid #007BFF;
    padding-bottom: 5px;
}

/* 🔵 GRID */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 15px;
    margin-top: 10px;
}

/* 🔵 CARDS */
.card {
    background: #0d6efd;
    color: white;
    padding: 15px;
    border-radius: 10px;
    box-shadow: 0 0 5px gray;
    text-align: center;
    transition: transform 0.2s;
    position: relative;
}

.card:hover {
    transform: scale(1.05);
}

/* 🔵 TOP */
.top {
    border: 2px solid #00c3ff;
    background: #1e90ff;
}

.top-badge {
    position: absolute;
    top: 5px;
    right: 5px;
    background: #00c3ff;
    color: black;
    padding: 4px 7px;
    font-size: 12px;
    border-radius: 5px;
    font-weight: bold;
}

/* 🔵 PRECIO */
.precio {
    color: #ffffff;
    font-weight: bold;
}

/* 🔵 BOTONES */
a.boton {
    display: inline-block;
    margin-top: 10px;
    padding: 8px;
    background: white;
    color: #0d6efd;
    text-decoration: none;
    border-radius: 5px;
    font-weight: bold;
}

a.boton:hover {
    background: #e6e6e6;
}

.meme {
    text-align: center;
    margin-top: 10px;
    font-size: 14px;
}
</style>
</head>

<body>

<header>
    <h1>🎁 Mi Wishlist</h1>
    <p>😄</p>

    <div class="versiculo">
        “El alma generosa será prosperada; y el que saciare, él también será saciado.” – Proverbios 11:25
    </div>

    <div class="broma">
        (Traduccion: no sea apretao que Dios bendice al dador alegre 😇🙏)
    </div>
</header>

<div class="container">

<div class="filtros">
    <select id="filtro" onchange="mostrar()">
        <option value="todos">Todos</option>
        <option value="1000-10000">$1.000 - $10.000</option>
        <option value="11000-20000">$11.000 - $20.000</option>
        <option value="21000-40000">$21.000 - $40.000</option>
        <option value="41000+">$41.000+</option>

</div>

<div id="contenedor"></div>

</div>

<script>

];

regalos.sort((a, b) => a.top - b.top);

/* 🔥 ARREGLADO */
function pasaFiltro(r, filtro) {
    if (filtro === "todos") return true;

    if (r.precio == null) return true;

    if (filtro.includes("+")) {
        let min = parseInt(filtro);
        return r.precio >= min;
    }

    let [min, max] = filtro.split("-").map(Number);
    return r.precio >= min && r.precio <= max;
}

function agrupar(filtro) {
    let grupos = {};

    regalos.forEach(r => {
        if (!pasaFiltro(r, filtro)) return;

        if (!grupos[r.categoria]) {
            grupos[r.categoria] = [];
        }
        grupos[r.categoria].push(r);
    });

    return grupos;
}

function formatoPrecio(num) {
    return "$" + num.toLocaleString("es-CL");
}

function mostrar() {
    let contenedor = document.getElementById("contenedor");
    contenedor.innerHTML = "";

    let filtro = document.getElementById("filtro").value;
    let grupos = agrupar(filtro);

    for (let categoria in grupos) {

        let seccion = `
        <div class="categoria">
            <h2>${categoria}</h2>
            <div class="grid">
        `;

        grupos[categoria].forEach(r => {
            seccion += `
            <div class="card ${r.top <= 3 ? 'top' : ''}">
                ${r.top <= 3 ? `<div class="top-badge">TOP ${r.top}</div>` : ""}
                <h3>${r.nombre}</h3>
                <p class="precio">
                    ${r.precio != null ? formatoPrecio(r.precio) : "Sin precio"}
                </p>
                ${r.link ? `<a class="boton" href="${r.link}" target="_blank">Ver</a>` : ""}
            </div>
            `;
        });

        seccion += `</div></div>`;
        contenedor.innerHTML += seccion;
    }
}

window.onload = mostrar;

</script>
